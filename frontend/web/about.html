<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>About - Hotel Management</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="topbar">
    <div class="topbar-brand">Hotel Management</div>
    <div class="topbar-links">
      <a href="dashboard.html#available" class="nav-link">BOOK</a>
      <a href="about.html" class="nav-link active">About</a>
      <div id="userArea" class="account-area" style="display:flex;align-items:center;gap:12px;">
        <div id="userName" style="font-weight:700;color:#fff"></div>
        <button id="accountButton" class="account-button">👤</button>
        <div class="account-dropdown hidden" id="accountDropdown">
          <div class="account-header">
            <strong id="userNameDropdown"></strong>
          </div>
          <button id="accountHome" class="small-btn">Home</button>
          <button id="accountPayments" class="small-btn">Payment History</button>
          <button id="accountBookings" class="small-btn">Current Bookings</button>
          <button id="signOut" class="small-btn">Sign Out</button>
        </div>
      </div>
    </div>
  </nav>
  <main class="content" style="max-width:900px;margin:40px auto;color:#fff;">
    <div class="card" style="padding:20px;">
      <h2>About</h2>
      <p>This is a simple Hotel Management demo. It demonstrates room booking, basic payment flow, receipts and account pages implemented with plain HTML, JavaScript and a small Java HTTP server.</p>
      
      <div style="margin-top:16px;"><button onclick="window.open('index.html','_self')" class="small-btn">Back</button></div>
    </div>

    <section id="gallerySection" style="margin-top:24px;">
      <div class="gallery" id="gallery"></div>
    </section>

    <div id="galleryOverlay" class="gallery-overlay hidden">
      <img id="overlayImg" src="" alt="Preview" />
    </div>
  </main>
  <script src="dashboard.js"></script>
  <script>
    // Gallery image list (map to files in /images)
    const images = [
      'images/room1.jpg','images/room2.webp','images/room3.jpg','images/room4.jpg','images/room5.jpg','images/room6.jpg',
      'images/room7.jpg','images/room%208.jpg','images/room%209.jpg','images/room%2010.jpg','images/room%2011.jpg','images/room%2012.jpg'
    ];

    const gallery = document.getElementById('gallery');
    images.forEach(src => {
      const img = document.createElement('img');
      img.src = src;
      img.className = 'gallery-item';
      img.loading = 'lazy';
      img.alt = 'Room image';
      img.addEventListener('click', () => showOverlay(src));
      gallery.appendChild(img);
    });

    const overlay = document.getElementById('galleryOverlay');
    const overlayImg = document.getElementById('overlayImg');
    let overlayTimer = null;
    function showOverlay(src){
      overlayImg.src = src;
      overlay.classList.remove('hidden');
      overlay.classList.add('visible');
      if (overlayTimer) clearTimeout(overlayTimer);
      overlayTimer = setTimeout(hideOverlay, 2000);
    }
    function hideOverlay(){
      overlay.classList.remove('visible');
      overlay.classList.add('hidden');
      overlayImg.src = '';
      if (overlayTimer) { clearTimeout(overlayTimer); overlayTimer = null; }
    }
    overlay.addEventListener('click', hideOverlay);
  </script>
</body>
</html>
